# Image-based deploy to DigitalOcean App Platform.
#
# Flow:
#   1. Build the web + api Docker images on the GitHub runner
#   2. Push both to ghcr.io (public packages, since the repo is public)
#   3. Call digitalocean/app_action/deploy@v2 which reads .do/app.yaml
#      and syncs the image-based spec to DO. DO pulls the fresh :latest
#      tags and rolls out the new revision.
#
# Why not source-based deploy? Source-based requires DO's GitHub App to
# be installed and authorized on the source repo. Our repo is owned by
# 0b10headedcalf, which the current contributor cannot administer. This
# workflow builds on GitHub-owned infra and only asks DO to pull images —
# no DO GitHub App install needed.
#
# Prereqs:
#   - Repo secret DIGITALOCEAN_ACCESS_TOKEN (App Platform read+write)
#   - The GitHub-provided GITHUB_TOKEN handles ghcr.io auth automatically
#   - Packages inherit visibility from the repo (public repo = public pkg)

name: Build images and deploy to DigitalOcean App Platform

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: do-app-platform-deploy
  cancel-in-progress: false

env:
  # Both images are pushed to ghcr under the repo owner's namespace.
  # Lowercased because ghcr rejects uppercase in image paths.
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/0b10headedcalf/careguide-dhdcs-web
  API_IMAGE: ghcr.io/0b10headedcalf/careguide-dhdcs-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- web ---
      # NEXT_PUBLIC_* must be present at BUILD time so Next.js inlines them
      # into the client bundle. Empty API base URL means the client uses
      # same-origin relative fetches to /api/*, which DO's gateway routes
      # to the api service.
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:main-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=AIzaSyDL1YdpBJQWEOM0RfJbZWbFjVKl80DF4UM
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      # --- api ---
      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:main-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Deploy app spec to App Platform
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          # app_spec_location defaults to .do/app.yaml. DO reads the image
          # references and pulls :latest from ghcr.
