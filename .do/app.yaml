# DigitalOcean App Platform spec — CareBridge CA full-stack deploy.
#
# Image-based, not source-based. GitHub Actions builds both service images
# on the runner and pushes them to ghcr.io on every push to main. DO pulls
# the images from ghcr.io — no DigitalOcean GitHub App install required,
# no repo-clone permissions to plumb.
#
# The images are public because the repo is public. If the repo goes
# private, add `image.registry_credentials` blocks with a ghcr PAT.
#
# One app, two services, gateway path-based routing:
#   /api/*  -> api service (FastAPI)
#   /*      -> web service (Next.js)
# Same origin means the frontend can call `/api/...` as a relative URL and
# CORS never fires.
name: careguide
region: nyc

services:
  - name: web
    image:
      registry_type: GHCR
      registry: 0b10headedcalf
      repository: careguide-dhdcs-web
      tag: latest
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
    routes:
      - path: /
    envs:
      # NEXT_PUBLIC_* is inlined into the client bundle at IMAGE BUILD time
      # by the GitHub Actions workflow (build-args passed to docker build).
      # These values are still declared here for parity with runtime env,
      # but the image already has the compiled values baked in.
      - key: NEXT_PUBLIC_API_BASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        scope: RUN_AND_BUILD_TIME
        value: AIzaSyDL1YdpBJQWEOM0RfJbZWbFjVKl80DF4UM

  - name: api
    image:
      registry_type: GHCR
      registry: 0b10headedcalf
      repository: careguide-dhdcs-api
      tag: latest
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: APP_ENV
        value: production
        scope: RUN_TIME
      # DATABASE_URL uses ephemeral SQLite for the hackathon. Container
      # restarts wipe the DB; the cache seeder can be re-run. For a real
      # deployment attach managed Postgres via the DO dashboard and
      # override this value.
      - key: DATABASE_URL
        value: sqlite:///./carebridge.db
        scope: RUN_TIME
      - key: DEBUG
        value: "false"
        scope: RUN_TIME
      # Same-origin traffic never triggers CORS, so this list only needs
      # to cover local development.
      - key: CORS_ORIGINS
        value: "http://localhost:3000"
        scope: RUN_TIME
      - key: LOG_LEVEL
        value: INFO
        scope: RUN_TIME
      - key: LOG_REDACTION_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: STORE_RAW_INTAKE_MESSAGES
        value: "false"
        scope: RUN_TIME
      # Optional keys — leave empty unless the dashboard sets them. The API
      # ships mock fallbacks / graceful empty responses when a key is
      # missing, so an unfilled key here degrades gracefully rather than
      # crashing.
      - key: NVIDIA_API_KEY
        value: ""
        scope: RUN_TIME
      - key: DIGITALOCEAN_API_TOKEN
        value: ""
        scope: RUN_TIME
      - key: GOOGLE_MAPS_SERVER_API_KEY
        value: ""
        scope: RUN_TIME
      - key: DATASF_APP_TOKEN
        value: ""
        scope: RUN_TIME
