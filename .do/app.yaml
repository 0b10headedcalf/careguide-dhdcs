# DigitalOcean App Platform spec — CareBridge CA full-stack deploy.
# One app, two services, gateway path-based routing:
#   /api/*  -> api service (FastAPI)
#   /*      -> web service (Next.js)
# Same origin means the frontend can call `/api/...` as a relative URL and
# CORS never fires. `doctl apps update <APP_ID> --spec .do/app.yaml` after
# any edit.
name: careguide
region: nyc

services:
  - name: web
    dockerfile_path: apps/web/Dockerfile
    source_dir: /
    git:
      repo_clone_url: https://github.com/0b10headedcalf/careguide-dhdcs.git
      branch: main
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
    routes:
      - path: /
    envs:
      # NEXT_PUBLIC_* must exist at BUILD time to be inlined into the client
      # bundle. Empty string here means the client makes same-origin relative
      # fetches to /api/*, which DO's gateway routes to the api service below.
      - key: NEXT_PUBLIC_API_BASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ""
      # Injected by the deploy workflow from the repository secret after the
      # browser-restricted key is rotated. The value must never be committed.
      - key: NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY}
      - key: NEXT_PUBLIC_APP_NAME
        scope: RUN_AND_BUILD_TIME
        value: CareGuide
      - key: NEXT_PUBLIC_ENABLE_VOICE
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: NEXT_PUBLIC_ENABLE_DOC_UPLOAD
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: NEXT_PUBLIC_ENABLE_AGENT_DEBUG
        scope: RUN_AND_BUILD_TIME
        value: "false"

  - name: api
    dockerfile_path: apps/api/Dockerfile
    source_dir: /
    git:
      repo_clone_url: https://github.com/0b10headedcalf/careguide-dhdcs.git
      branch: main
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: APP_ENV
        value: production
        scope: RUN_TIME
      - key: SECRET_KEY
        value: ${CAREBRIDGE_SECRET_KEY}
        scope: RUN_TIME
        type: SECRET
      # DATABASE_URL uses ephemeral SQLite for the hackathon. Container
      # restarts wipe the DB; the cache seeder can be re-run. For a real
      # deployment attach managed Postgres via the DO dashboard and
      # override this value.
      - key: DATABASE_URL
        value: sqlite:///./carebridge.db
        scope: RUN_TIME
      - key: DEBUG
        value: "false"
        scope: RUN_TIME
      # Same-origin traffic never triggers CORS, so this list only needs
      # to cover local development. Must be a JSON array: pydantic-settings
      # json-decodes list-typed fields at the env-source layer, before any
      # field_validator runs, so a bare comma-separated string crashes boot.
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'
        scope: RUN_TIME
      - key: LOG_LEVEL
        value: INFO
        scope: RUN_TIME
      - key: LOG_REDACTION_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: STORE_RAW_INTAKE_MESSAGES
        value: "false"
        scope: RUN_TIME
      # Optional keys degrade to honest empty/unavailable responses.
      - key: NVIDIA_API_KEY
        value: ""
        scope: RUN_TIME
      - key: DIGITALOCEAN_API_TOKEN
        value: ""
        scope: RUN_TIME
      - key: GRADIENT_AGENT_ENDPOINT
        value: ${GRADIENT_AGENT_ENDPOINT}
        scope: RUN_TIME
        type: SECRET
      - key: GRADIENT_AGENT_ACCESS_KEY
        value: ${GRADIENT_AGENT_ACCESS_KEY}
        scope: RUN_TIME
        type: SECRET
      - key: ELEVENLABS_API_KEY
        value: ${ELEVENLABS_API_KEY}
        scope: RUN_TIME
        type: SECRET
      - key: ELEVENLABS_STT_MODEL
        value: scribe_v2
        scope: RUN_TIME
      - key: UPLOAD_DIR
        value: .data/uploads
        scope: RUN_TIME
      - key: MAX_UPLOAD_MB
        value: "15"
        scope: RUN_TIME
      - key: DATA_SF_HEALTH_FACILITIES_URL
        value: https://data.sfgov.org/resource/jhsu-2pka.json
        scope: RUN_TIME
      - key: GOOGLE_MAPS_SERVER_API_KEY
        value: ""
        scope: RUN_TIME
      - key: GOOGLE_MAPS_API_KEY
        value: ${GOOGLE_MAPS_API_KEY}
        scope: RUN_TIME
        type: SECRET
      - key: DATASF_APP_TOKEN
        value: ""
        scope: RUN_TIME
